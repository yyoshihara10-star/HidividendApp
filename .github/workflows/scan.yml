name: Auto Scan High Dividend Stocks

on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Pythonのセットアップ (バージョン3.12)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 必要なライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance>=0.2.37 curl_cffi xlrd openpyxl libsql-experimental

      - name: スキャン(worker.py)の実行
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python worker.py
